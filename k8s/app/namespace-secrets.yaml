# Namespace + Secrets
apiVersion: v1
kind: Namespace
metadata:
  name: sentisoc
  labels:
    pod-security.kubernetes.io/enforce: restricted
---
# In real deployments: use SealedSecrets or Vault
# kubectl create secret generic sentisoc-secrets --from-literal=...
apiVersion: v1
kind: Secret
metadata:
  name: sentisoc-secrets
  namespace: sentisoc
type: Opaque
stringData:
  jwt-secret:   "super-secret-jwt-key-change-in-prod"
  auth-db-url:  "postgresql://sentisoc:pass@postgres:5432/auth"
  admin-key:    "admin-secret"
