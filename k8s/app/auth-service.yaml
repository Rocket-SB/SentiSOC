# Auth Service — Kubernetes Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: sentisoc
  labels:
    app: auth-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      # Pod Security Standards: non-root user
      securityContext:
        runAsNonRoot: true
        runAsUser:  1000
        runAsGroup: 1000
        fsGroup:    1000
      containers:
        - name: auth-service
          image: sentisoc/auth-service:latest
          ports:
            - containerPort: 5001
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sentisoc-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sentisoc-secrets
                  key: auth-db-url
          resources:
            requests:
              memory: "128Mi"
              cpu:    "100m"
            limits:
              memory: "256Mi"
              cpu:    "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Flask needs /tmp
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: sentisoc
spec:
  selector:
    app: auth-service
  ports:
    - port: 5001
      targetPort: 5001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: sentisoc
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
