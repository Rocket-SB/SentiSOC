<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SentiSOC — Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
    :root {
      --bg: #0a0e1a; --surface: #111827; --border: #1e2d45;
      --accent: #00d4ff; --accent2: #ff6b35; --text: #e2e8f0;
      --muted: #64748b; --success: #22c55e; --danger: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.05) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(255,107,53,0.05) 0%, transparent 50%);
    }
    .login-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 40px; width: 400px;
      box-shadow: 0 0 60px rgba(0,212,255,0.08);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo .brand { font-family: 'IBM Plex Mono', monospace; font-size: 28px;
                   color: var(--accent); letter-spacing: 3px; }
    .logo .sub { font-size: 12px; color: var(--muted); letter-spacing: 2px;
                 text-transform: uppercase; margin-top: 4px; }
    .badge {
      display: flex; gap: 8px; margin-bottom: 24px; justify-content: center;
    }
    .badge span {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      padding: 3px 8px; border-radius: 4px; letter-spacing: 1px;
    }
    .badge .admin  { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .badge .user   { background: rgba(0,212,255,0.1);  color: var(--accent); border: 1px solid rgba(0,212,255,0.3); }
    .badge .guest  { background: rgba(100,116,139,0.2); color: var(--muted); border: 1px solid var(--border); }
    label { display: block; font-size: 11px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; margin-top: 16px; }
    input {
      width: 100%; padding: 10px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text);
      font-family: 'IBM Plex Mono', monospace; font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .btn {
      width: 100%; margin-top: 24px; padding: 12px;
      background: var(--accent); color: #000; border: none;
      border-radius: 6px; font-family: 'IBM Plex Mono', monospace;
      font-size: 13px; font-weight: 600; letter-spacing: 2px;
      cursor: pointer; transition: all 0.2s; text-transform: uppercase;
    }
    .btn:hover { background: #00b8d9; box-shadow: 0 0 20px rgba(0,212,255,0.3); }
    .error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444; padding: 10px 14px; border-radius: 6px;
      font-size: 13px; margin-top: 16px;
    }
    .demo-creds {
      margin-top: 24px; padding: 14px; background: rgba(0,212,255,0.05);
      border: 1px solid rgba(0,212,255,0.15); border-radius: 8px;
    }
    .demo-creds p { font-size: 11px; color: var(--muted); margin-bottom: 8px;
                    text-transform: uppercase; letter-spacing: 1px; }
    .demo-creds table { width: 100%; font-family: 'IBM Plex Mono', monospace;
                        font-size: 11px; color: var(--text); border-collapse: collapse; }
    .demo-creds td { padding: 3px 6px; }
    .demo-creds td:first-child { color: var(--muted); }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <div class="brand">SentiSOC</div>
      <div class="sub">Security Operations Center</div>
    </div>
    <div class="badge">
      <span class="admin">ADMIN</span>
      <span class="user">USER</span>
      <span class="guest">GUEST</span>
    </div>
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="enter username" required>
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
      {% if error %}
      <div class="error">⚠ {{ error }}</div>
      {% endif %}
      <button type="submit" class="btn">→ Authenticate</button>
    </form>
    <div style="margin-top: 20px; text-align: center; border-top: 1px solid var(--border); padding-top: 20px;">
      <p style="font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">Or authenticate with</p>
      <a href="/login/sso" class="btn" style="background: transparent; color: var(--accent); border: 1px solid var(--accent); display: block; text-decoration: none;">
        ⎈ Login via Keycloak SSO
      </a>
    </div>
    <div class="demo-creds">
      <p>Demo Credentials</p>
      <table>
        <tr><td>admin</td><td>Admin@123</td><td style="color:#ef4444">admin</td></tr>
        <tr><td>john_user</td><td>User@123</td><td style="color:#00d4ff">user</td></tr>
        <tr><td>guest1</td><td>Guest@123</td><td style="color:#64748b">guest</td></tr>
      </table>
    </div>
  </div>
</body>
</html>
