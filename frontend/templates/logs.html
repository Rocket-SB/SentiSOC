<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SentiSOC — Log Analyzer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
    :root {
      --bg: #0a0e1a; --surface: #111827; --surface2: #162032;
      --border: #1e2d45; --accent: #00d4ff;
      --text: #e2e8f0; --muted: #64748b;
      --success: #22c55e; --danger: #ef4444; --warn: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }
    
    /* Navigation */
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .nav-brand { font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-size: 18px; letter-spacing: 2px; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-links { display: flex; gap: 16px; align-items: center; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 13px; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }
    .role-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 10px; border-radius: 4px; letter-spacing: 1px; text-transform: uppercase; background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    
    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

    /* Log Analyzer Toolbar */
    .toolbar {
      display: flex; gap: 16px; margin-bottom: 16px;
      background: var(--surface); padding: 16px; border-radius: 8px; border: 1px solid var(--border);
      align-items: center;
    }
    select, input, button {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      padding: 8px 12px; border-radius: 4px; font-family: 'IBM Plex Sans', sans-serif; font-size: 13px;
    }
    select:focus, input:focus { outline: none; border-color: var(--accent); }
    button { cursor: pointer; background: rgba(0,212,255,0.1); color: var(--accent); border-color: var(--accent); font-weight: 600; transition: 0.2s; }
    button:hover { background: var(--accent); color: #000; }
    .btn-danger { background: rgba(239,68,68,0.1); color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    /* Terminal Window */
    .terminal-window {
      background: #000; border: 1px solid var(--border); border-radius: 8px;
      height: 600px; overflow-y: auto; padding: 16px;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #a9b7c6;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    .log-line { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 6px 0; word-wrap: break-word; }
    .log-line:hover { background: rgba(255,255,255,0.05); }
    .log-meta { display: inline-block; min-width: 280px; }
    .log-time { color: var(--muted); margin-right: 12px; }
    .log-container { color: var(--accent); }
    
    /* Log Highlighting */
    .hl-error { color: var(--danger); font-weight: bold; }
    .hl-warn { color: var(--warn); }
    .hl-info { color: var(--success); }
    .hl-highlight { background: rgba(239,68,68,0.2); border-radius: 2px; }
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">SentiSOC</span>
    <div class="nav-right">
      <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/alerts">Alerts</a>
        <a href="/admin">Admin Panel</a>
        <a href="/logs" style="color: var(--accent);">Logs</a>
        <a href="/reports">Reports</a>
        <a href="/logout">Logout</a>
      </div>
      <span class="role-badge">{{ user.role }}</span>
      <span style="font-size:13px; color:var(--muted)">{{ user.username }}</span>
    </div>
  </nav>

  <main>
    <h1>Live Log Analyzer</h1>
    <p class="subtitle">Querying centralized Loki cluster data.</p>

    <div class="toolbar">
      <select id="service-filter">
        <option value='{container=~".+"}'>All Services (Global Firehose)</option>
        <option value='{container=~".*auth-service.*"}'>Auth Service</option>
        <option value='{container=~".*reservation-service.*"}'>Reservation Service</option>
        <option value='{container=~".*resource-service.*"}'>Resource Service</option>
        <option value='{container=~".*frontend.*"}'>Frontend Console</option>
      </select>
      
      <input type="text" id="search-filter" placeholder="Filter text (e.g. error, john_user)" style="flex-grow: 1;">
      
      <button onclick="fetchLogs()">⟳ Refresh Logs</button>
      <button id="toggle-live" class="btn-danger" onclick="toggleLive()">⏸ Stop Live Stream</button>
    </div>

    <div class="terminal-window" id="terminal">
      <div style="color: var(--muted); text-align: center; margin-top: 20px;">Establishing connection to Loki cluster...</div>
    </div>
  </main>

  <script>
    let liveInterval = null;
    let isLive = true;

    function formatLine(line, searchTerm) {
      // Syntax Highlighting for Log Levels
      let formatted = line
        .replace(/ERROR/g, '<span class="hl-error">ERROR</span>')
        .replace(/Exception/g, '<span class="hl-error">Exception</span>')
        .replace(/Traceback/g, '<span class="hl-error">Traceback</span>')
        .replace(/WARN/g, '<span class="hl-warn">WARN</span>')
        .replace(/INFO/g, '<span class="hl-info">INFO</span>')
        .replace(/SUCCESS/g, '<span class="hl-info">SUCCESS</span>')
        .replace(/200 OK/g, '<span class="hl-info">200 OK</span>');

      // Highlight custom search terms
      if (searchTerm) {
        const regex = new RegExp(`(${searchTerm})`, 'gi');
        formatted = formatted.replace(regex, '<span class="hl-highlight">$1</span>');
      }
      return formatted;
    }

    async function fetchLogs() {
      const query = document.getElementById('service-filter').value;
      const searchTerm = document.getElementById('search-filter').value.toLowerCase();
      const terminal = document.getElementById('terminal');

      try {
        const response = await fetch(`/api/loki?query=${encodeURIComponent(query)}&limit=150`);
        const data = await response.json();
        
        if (data.status !== 'success') throw new Error("Loki returned an error");

        let html = '';
        let allLogs = [];

        // Loki returns data in streams. We need to flatten and sort them by time.
        data.data.result.forEach(stream => {
          const containerName = stream.stream.container || 'unknown_container';
          // Clean up Docker Compose naming convention
          const shortName = containerName.replace('sentisoc-', '').replace('-1', ''); 
          
          stream.values.forEach(val => {
            allLogs.push({
              ts: parseInt(val[0]), // Nanoseconds
              timeStr: new Date(parseInt(val[0]) / 1000000).toLocaleString(),
              container: shortName,
              line: val[1]
            });
          });
        });

        // Sort descending (newest at bottom of the terminal)
        allLogs.sort((a, b) => a.ts - b.ts);

        // Filter and Render
        allLogs.forEach(log => {
          if (!searchTerm || log.line.toLowerCase().includes(searchTerm)) {
            html += `
              <div class="log-line">
                <span class="log-meta">
                  <span class="log-time">[${log.timeStr}]</span>
                  <span class="log-container">&lt;${log.container}&gt;</span>
                </span>
                <span class="log-text">${formatLine(log.line, searchTerm)}</span>
              </div>`;
          }
        });

        if (html === '') {
          terminal.innerHTML = '<div style="color: var(--muted); text-align: center; margin-top: 20px;">No logs match your filter criteria.</div>';
        } else {
          // Only auto-scroll if the user is already near the bottom
          const isAtBottom = terminal.scrollHeight - terminal.scrollTop <= terminal.clientHeight + 50;
          terminal.innerHTML = html;
          if (isAtBottom) terminal.scrollTop = terminal.scrollHeight;
        }

      } catch (err) {
        terminal.innerHTML = `<div style="color: var(--danger); text-align: center; margin-top: 20px;">Connection to Loki failed: ${err.message}</div>`;
      }
    }

    function toggleLive() {
      const btn = document.getElementById('toggle-live');
      isLive = !isLive;
      if (isLive) {
        btn.innerText = "⏸ Stop Live Stream";
        btn.classList.add("btn-danger");
        btn.style.background = "";
        fetchLogs();
        liveInterval = setInterval(fetchLogs, 5000);
      } else {
        btn.innerText = "▶ Resume Stream";
        btn.classList.remove("btn-danger");
        btn.style.background = "rgba(34,197,94,0.1)";
        btn.style.color = "var(--success)";
        btn.style.borderColor = "var(--success)";
        clearInterval(liveInterval);
      }
    }

    // Initial load and start the live stream loop (every 5 seconds)
    fetchLogs();
    liveInterval = setInterval(fetchLogs, 5000);
    
    // Auto-refresh when dropdown changes
    document.getElementById('service-filter').addEventListener('change', fetchLogs);
    // Refresh on Enter key in search box
    document.getElementById('search-filter').addEventListener('keyup', (e) => { if (e.key === 'Enter') fetchLogs(); });
  </script>
</body>
</html>
