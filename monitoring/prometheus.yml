# Prometheus scrape configuration for SentiSOC
global:
  scrape_interval:     15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'alertmanager:9093'

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:5001']
    metrics_path: '/metrics'

  - job_name: 'reservation-service'
    static_configs:
      - targets: ['reservation-service:5002']
    metrics_path: '/metrics'

  - job_name: 'resource-service'
    static_configs:
      - targets: ['resource-service:5003']
    metrics_path: '/metrics'
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']