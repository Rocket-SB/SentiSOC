# SentiSOC CI/CD Pipeline
# Triggers on push to main and PRs
# Security Gates: Trivy CVE scan, Bandit SAST, unit tests

name: SentiSOC CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Gate 1: SAST (Static Analysis) ─────────────────────────────────────────
  sast:
    name: "SAST — Bandit Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit on auth-service
        run: |
          bandit -r auth-service/app.py \
            -ll \
            --skip B104 \
            -f json \
            -o bandit-auth.json || true
          bandit -r auth-service/app.py -ll --skip B104

      - name: Run Bandit on reservation-service
        run: bandit -r reservation-service/app.py -ll --skip B104

      - name: Run Bandit on resource-service
        run: bandit -r resource-service/app.py -ll --skip B104

      - name: Upload SAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-reports
          path: bandit-*.json

  # ── Gate 2: Unit Tests ──────────────────────────────────────────────────────
  test:
    name: "Unit & Integration Tests"
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r auth-service/requirements.txt
          pip install pytest pytest-cov requests

      - name: Run auth-service tests
        run: pytest tests/ -v --cov=auth-service --cov-report=xml
        env:
          SECRET_KEY: test-secret
          DATABASE_URL: sqlite:///test.db

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Gate 3: Build Docker Images ─────────────────────────────────────────────
  build:
    name: "Build Docker Images"
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [auth-service, reservation-service, resource-service, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (${{ matrix.service }})
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            ./${{ matrix.service }}

      - name: Save image for scanning
        run: |
          docker save \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            -o /tmp/${{ matrix.service }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp/${{ matrix.service }}.tar

  # ── Gate 4: CVE Scanning (Trivy) ────────────────────────────────────────────
  trivy-scan:
    name: "CVE Scan — Trivy"
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        service: [auth-service, reservation-service, resource-service, frontend]
    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/${{ matrix.service }}.tar

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan ${{ matrix.service }} for CVEs
        # SECURITY GATE: Block if HIGH or CRITICAL vulnerabilities with available fixes
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}

      - name: Generate Trivy SARIF report
        if: always()
        run: |
          trivy image \
            --format sarif \
            --output trivy-${{ matrix.service }}.sarif \
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }} || true

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.sarif

  # ── Gate 5: Dependency Scanning ─────────────────────────────────────────────
  dependency-scan:
    name: "Dependency Audit"
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit auth-service dependencies
        run: pip-audit -r auth-service/requirements.txt --format json -o audit-auth.json || true

      - name: Audit reservation-service dependencies
        run: pip-audit -r reservation-service/requirements.txt --format json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: audit-*.json

  # ── Deploy (only on main, after all gates pass) ──────────────────────────────
  deploy:
    name: "Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: [trivy-scan, dependency-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to cluster
        run: |
          echo "Deploying SentiSOC version ${{ github.sha }} to Kubernetes..."
          # kubectl apply -f k8s/app/
          # kubectl set image deployment/auth-service auth-service=ghcr.io/.../auth-service:${{ github.sha }}
          # kubectl rollout status deployment/auth-service --timeout=120s
          echo "Deploy complete (configure kubeconfig secret for real deployment)"
